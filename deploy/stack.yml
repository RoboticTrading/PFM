# PFM — Docker Swarm stack (LAN-only behind the shared Caddy).
#
# Deployed by .github/workflows/deploy.yml on every push to main (self-hosted
# runner on the swarm). App env (DATABASE_URL as the least-privilege pfm role,
# PFM_PIN, PFM_SESSION_SECRET, optional MOE_*) is sourced at deploy time from
# /mnt/qnap/config/pfm.env on the manager — NEVER committed. The
# financialmanager schema already lives on MyDB; no schema step here.
#
# Routing is via the shared manual Caddyfile (/mnt/qnap/caddy/Caddyfile), NOT
# caddy-docker-proxy labels. The pfm.bolivardrive.com block carries a private-
# IP remote_ip guard so the app is unreachable from the public internet even
# though it shares the Caddy ingress. Financial data — LAN-only, never public.
version: "3.8"

services:
  pfm:
    image: registry.prop-desk.io/pfm:latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Next standalone binds the container hostname by default; bind all
      # interfaces so Caddy + healthchecks can reach it.
      HOSTNAME: "0.0.0.0"
      # MyDB as the pfm role (host data02 resolves on the algobots_ingress
      # overlay). Sourced from /mnt/qnap/config/pfm.env at deploy time.
      DATABASE_URL: ${DATABASE_URL}
      PFM_PIN: ${PFM_PIN}
      PFM_SESSION_SECRET: ${PFM_SESSION_SECRET}
      # Optional $0 MoE categorize — off by default.
      MOE_BASE_URL: ${MOE_BASE_URL:-}
      AI_ENABLED: ${AI_ENABLED:-false}
    networks:
      - algobots_ingress
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: any

networks:
  algobots_ingress:
    external: true
