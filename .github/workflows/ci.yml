name: ci

# PR checks only. Pushes to main are gated + deployed by deploy.yml (which runs
# the same gate), so triggering here on push would just duplicate that gate.
on:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # DB-touching tests skip cleanly (no DATABASE_URL in CI).
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
