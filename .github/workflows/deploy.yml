# Deploy PFM to the Swarm cluster. On push to main: gate (cloud) → build +
# push + roll out on a SELF-HOSTED runner that lives on the swarm (swarm1), so
# it can reach the LAN-only registry (registry.prop-desk.io) + the cluster. A
# GitHub-hosted runner cannot reach either. App env lives owner-only on the
# cluster (/mnt/qnap/config/pfm.env) — never in the repo or GH secrets.
# Migrations run on app boot against MyDB (the pfm role). The first deploy +
# Caddy + LAN DNS were the one-time [HUMAN] step (TASK 11.2).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  build-and-deploy:
    needs: gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build, push, and roll out on the swarm
        run: |
          set -euo pipefail
          IMG=registry.prop-desk.io/pfm
          docker build -t "$IMG:latest" -t "$IMG:${GITHUB_SHA}" .
          docker push "$IMG:latest"
          docker push "$IMG:${GITHUB_SHA}"
          set -a; . /mnt/qnap/config/pfm.env; set +a
          docker stack deploy --with-registry-auth --resolve-image=always \
            -c deploy/stack.yml pfm
