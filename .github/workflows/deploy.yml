name: deploy

# Push → build image → push to GHCR → roll the swarm service (CI parity with
# prop-desk.io). The financialmanager schema already lives on MyDB; this only
# ships the app. The first deploy + Caddy + LAN DNS is the one-time [HUMAN] step
# (TASKS 11.2).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pfm

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    steps:
      # Roll the swarm service to the freshly-pushed image over SSH to a swarm
      # manager. Secrets configured in the repo: SWARM_SSH_HOST / _USER / _KEY.
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_SSH_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            docker service update \
              --image ghcr.io/${{ github.repository_owner }}/pfm:${{ github.sha }} \
              --with-registry-auth \
              pfm_pfm
